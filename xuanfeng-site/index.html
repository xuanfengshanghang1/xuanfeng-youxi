<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>炫锋商行 - 传奇手游官网</title>
<meta name="Keywords" content="炫锋商行,炫锋商行手游,炫锋传奇,传奇手游">
<meta name="Description" content="炫锋商行是一款大型角色扮演传奇手游，自由交易，装备保值。">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

<!-- ===== 首屏 Hero ===== -->
<div class="section sec1">
  <div class="container hero-container">
    <a href="/"><img class="logo" id="siteLogo" src="img/logo_original.png" alt="炫锋商行"></a>
    <ul class="menu-list">
      <li><a href="/">官网首页<br><span>HOME</span></a></li>
      <li><a href="#news">游戏资讯<br><span>NEWS</span></a></li>
      <li><a href="#gift">礼包中心<br><span>GIFT</span></a></li>
      <li><a href="#info">游戏资料<br><span>GAME INFO</span></a></li>
      <li><a href="#strategy">游戏攻略<br><span>RAIDERS</span></a></li>
      <li><a href="#contact">联系我们<br><span>MEDIA</span></a></li>
    </ul>
  </div>
  <div class="hero-action">
    <a class="video-btn" href="javascript:void(0)" onclick="playVideo()">&#9654; 观看视频</a>
  </div>
  <div class="download-area">
    <img class="qr-code" src="img/qrcode_original.png" alt="扫码下载">
    <div class="download-btns">
      <a href="#" id="androidBtn" class="btn-android">安卓下载</a>
      <a href="#" id="iosBtn" class="btn-ios">苹果下载</a>
    </div>
  </div>
</div>

<!-- ===== 第二屏：轮播 + 新闻 ===== -->
<div class="section sec2" id="news">
  <div class="container">
    <div class="sec2-top">
      <div class="banner-box">
        <div class="banner-slider" id="bannerSlider"></div>
        <div class="banner-nav" id="bannerNav"></div>
      </div>
      <div class="news-box">
        <div class="news-tabs" id="newsTabs"></div>
        <a class="more-link" href="#">查看更多</a>
        <div id="newsLists"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 第三屏：新手指导 + 职业介绍 ===== -->
<div class="section sec3">
  <div class="container">
    <div class="guide-box">
      <div class="guide-grid" id="guideGrid"></div>
      <div class="guide-links" id="guideLinks"></div>
    </div>
    <div class="role-box">
      <div class="role-nav" id="roleNav"></div>
      <div id="roleSlides"></div>
    </div>
  </div>
</div>

<!-- ===== 第四屏：游戏资料 + 游戏攻略 ===== -->
<div class="section sec4" id="info">
  <div class="container">
    <div class="sec4-grid">
      <div class="info-col">
        <div class="section-title">游戏资料</div>
        <div class="info-links" id="infoLinks"></div>
      </div>
      <div class="strategy-col" id="strategy">
        <div class="section-title">游戏攻略 <a class="more-link" href="#">查看更多</a></div>
        <div class="strategy-tabs" id="stratTabs"></div>
        <div id="stratLists"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 第五屏：影音中心 + 名人堂 ===== -->
<div class="section sec5">
  <div class="container">
    <div class="sec5-grid">
      <div class="video-col">
        <div class="section-title">影音中心 <a class="more-link" href="#">查看更多</a></div>
        <div class="video-box">
          <img src="img/video-thumb.png" alt="游戏视频">
          <div class="video-mask"></div>
          <a class="play-btn" href="javascript:void(0)" onclick="playVideo()">&#9654;</a>
          <p class="video-desc">游戏视频</p>
        </div>
      </div>
      <div class="hall-col">
        <div class="section-title">名人堂 <a class="more-link" href="#">查看更多</a></div>
        <div class="hall-grid" id="hallGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 礼包中心 ===== -->
<div class="section sec-gift" id="gift">
  <div class="container">
    <div class="section-title center">礼包中心</div>
    <div class="gift-grid" id="giftGrid"></div>
  </div>
</div>

<!-- ===== 底部 ===== -->
<div class="section footer" id="contact">
  <div class="container">
    <div class="footer-info" id="footerInfo"></div>
  </div>
</div>

<!-- ===== 视频弹窗 ===== -->
<div class="video-overlay" id="videoOverlay">
  <a class="close-btn" href="javascript:void(0)" onclick="closeVideo()">关闭</a>
  <video id="mainVideo" width="100%" controls autoplay>
    <source id="videoSource" src="" type="video/mp4">
  </video>
</div>

<script>
// === 加载JSON数据并渲染 ===
// 优先从localStorage读取（后台修改的数据），其次从data.json文件
const stored = localStorage.getItem('xuanfeng_data');
if (stored) {
  try {
    renderSite(JSON.parse(stored));
  } catch(e) {
    loadFromFile();
  }
} else {
  loadFromFile();
}

function loadFromFile() {
  fetch('data.json')
    .then(r => r.json())
    .then(data => {
      renderSite(data);
    })
    .catch(err => {
      console.error('加载data.json失败:', err);
    });
}

function renderSite(data) {
  const site = data.site;

  // 下载链接
  document.getElementById('androidBtn').href = site.androidUrl;
  document.getElementById('iosBtn').href = site.iosUrl;
  document.getElementById('videoSource').src = site.videoUrl;

  // Banner
  const bannerSlider = document.getElementById('bannerSlider');
  const bannerNav = document.getElementById('bannerNav');
  data.banners.forEach((b, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.innerHTML = `<img src="${b.img}" alt="${b.title}"><p>${b.title}</p>`;
    bannerSlider.appendChild(slide);

    const nav = document.createElement('span');
    nav.className = i === 0 ? 'active' : '';
    nav.textContent = b.title;
    nav.onclick = () => goSlide(i);
    bannerNav.appendChild(nav);
  });

  // 新闻
  const newsTabs = document.getElementById('newsTabs');
  const newsLists = document.getElementById('newsLists');
  const newsCategories = Object.keys(data.news);
  newsCategories.forEach((cat, i) => {
    const tab = document.createElement('a');
    tab.href = 'javascript:void(0)';
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.textContent = cat;
    tab.onclick = () => switchTab('newsTabs', 'newsList', i, newsCategories.length);
    newsTabs.appendChild(tab);

    const listDiv = document.createElement('div');
    listDiv.className = 'news-list' + (i === 0 ? ' active' : '');
    listDiv.id = 'newsList' + i;
    const ul = document.createElement('ul');
    data.news[cat].forEach(item => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="${item.url}"><span>${item.date}</span>[${item.tag}] | ${item.title}</a>`;
      ul.appendChild(li);
    });
    listDiv.appendChild(ul);
    newsLists.appendChild(listDiv);
  });

  // 新手指导
  const guideGrid = document.getElementById('guideGrid');
  data.guides.forEach((g, i) => {
    const a = document.createElement('a');
    a.href = g.url;
    a.className = 'guide-item g' + (i + 1);
    a.textContent = g.name;
    guideGrid.appendChild(a);
  });

  const guideLinksEl = document.getElementById('guideLinks');
  data.guideLinks.forEach(g => {
    const a = document.createElement('a');
    a.href = g.url;
    a.className = 'gl';
    a.textContent = g.name;
    guideLinksEl.appendChild(a);
  });

  // 职业
  const roleNav = document.getElementById('roleNav');
  const roleSlides = document.getElementById('roleSlides');
  data.roles.forEach((r, i) => {
    const tab = document.createElement('a');
    tab.href = 'javascript:void(0)';
    tab.className = 'role-tab' + (i === 0 ? ' active' : '');
    tab.textContent = r.tag;
    tab.onclick = () => switchRole(i);
    roleNav.appendChild(tab);

    const stars = Array.from({length:5}, (_,s) => `<span class="star ${s < r.difficulty ? 'on' : 'off'}"></span>`).join('');
    const slide = document.createElement('div');
    slide.className = 'role-slide' + (i === 0 ? ' active' : '');
    slide.id = 'role' + i;
    slide.innerHTML = `
      <div class="role-info">
        <p class="role-attr">职业属性：<strong>${r.attr}</strong></p>
        <p class="role-diff">上手难度：${stars}</p>
        <div class="gender-toggle">
          <a href="javascript:void(0)" class="gender-btn active" onclick="switchGender(${i},'m')">男</a>
          <a href="javascript:void(0)" class="gender-btn" onclick="switchGender(${i},'w')">女</a>
        </div>
      </div>
      <div class="role-img">
        <img class="man" src="${r.manImg}" alt="${r.name}·男">
        <img class="woman" src="${r.womanImg}" alt="${r.name}·女" style="display:none">
      </div>`;
    roleSlides.appendChild(slide);
  });

  // 游戏资料
  const infoLinks = document.getElementById('infoLinks');
  const infoCats = Object.keys(data.gameInfo);
  infoCats.forEach(cat => {
    const group = document.createElement('div');
    group.className = 'info-group';
    let html = `<h3>${cat}</h3>`;
    data.gameInfo[cat].forEach(item => {
      html += `<a href="${item.url}">${item.name}</a>`;
    });
    html += `<a href="#" class="link-more">MORE +</a>`;
    group.innerHTML = html;
    infoLinks.appendChild(group);
  });

  // 攻略
  const stratTabs = document.getElementById('stratTabs');
  const stratLists = document.getElementById('stratLists');
  const stratCats = Object.keys(data.strategy);
  stratCats.forEach((cat, i) => {
    const tab = document.createElement('a');
    tab.href = 'javascript:void(0)';
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.textContent = cat;
    tab.onclick = () => switchTab('stratTabs', 'stratList', i, stratCats.length);
    stratTabs.appendChild(tab);

    const listDiv = document.createElement('div');
    listDiv.className = 'strategy-list' + (i === 0 ? ' active' : '');
    listDiv.id = 'stratList' + i;
    const ul = document.createElement('ul');
    data.strategy[cat].forEach(item => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="${item.url}"><span>${item.date}</span>[${item.tag}] | ${item.title}</a>`;
      ul.appendChild(li);
    });
    listDiv.appendChild(ul);
    stratLists.appendChild(listDiv);
  });

  // 名人堂
  const hallGrid = document.getElementById('hallGrid');
  data.hall.forEach(h => {
    const item = document.createElement('div');
    item.className = 'hall-item';
    item.innerHTML = `<img src="${h.img}" alt="${h.desc}"><p>${h.desc}</p>`;
    hallGrid.appendChild(item);
  });

  // 礼包
  const giftGrid = document.getElementById('giftGrid');
  data.gifts.forEach(g => {
    const card = document.createElement('div');
    card.className = 'gift-card';
    card.innerHTML = `
      <div class="gift-icon">${g.icon}</div>
      <h3>${g.name}</h3>
      <p>${g.desc}</p>
      <a href="${g.url}" class="gift-btn">立即领取</a>`;
    giftGrid.appendChild(card);
  });

  // 底部
  const footerInfo = document.getElementById('footerInfo');
  footerInfo.innerHTML = `
    <p>应用名称：${site.name}</p>
    <p><a href="#">涉及权限</a> | <a href="#">隐私政策</a></p>
    <p>${site.copyright}</p>
    <p class="contact-text">${site.contact}</p>`;

  // 启动轮播
  startBannerAuto();
}

// === 通用Tab切换 ===
function switchTab(tabContainerId, listClassPrefix, activeIndex, total) {
  const tabs = document.getElementById(tabContainerId).querySelectorAll('.tab');
  tabs.forEach((t, i) => t.classList.toggle('active', i === activeIndex));
  for (let i = 0; i < total; i++) {
    const list = document.getElementById(listClassPrefix + i);
    if (list) list.classList.toggle('active', i === activeIndex);
  }
}

// === Banner轮播 ===
let currentSlide = 0;
let slideCount = 0;

function goSlide(n) {
  const slides = document.querySelectorAll('#bannerSlider .slide');
  const nav = document.querySelectorAll('#bannerNav span');
  slides[currentSlide]?.classList.remove('active');
  nav[currentSlide]?.classList.remove('active');
  currentSlide = n;
  slides[currentSlide]?.classList.add('active');
  nav[currentSlide]?.classList.add('active');
}

function startBannerAuto() {
  slideCount = document.querySelectorAll('#bannerSlider .slide').length;
  setInterval(() => {
    goSlide((currentSlide + 1) % slideCount);
  }, 4000);
}

// === 职业切换 ===
function switchRole(n) {
  document.querySelectorAll('.role-tab').forEach((t, i) => t.classList.toggle('active', i === n));
  document.querySelectorAll('.role-slide').forEach((s, i) => s.classList.toggle('active', i === n));
}

// === 性别切换 ===
function switchGender(roleN, gender) {
  const slide = document.getElementById('role' + roleN);
  const btns = slide.querySelectorAll('.gender-btn');
  btns.forEach(b => b.classList.remove('active'));
  if (gender === 'm') {
    btns[0].classList.add('active');
    slide.querySelector('.man').style.display = '';
    slide.querySelector('.woman').style.display = 'none';
  } else {
    btns[1].classList.add('active');
    slide.querySelector('.man').style.display = 'none';
    slide.querySelector('.woman').style.display = '';
  }
}

// === 视频弹窗 ===
function playVideo() {
  document.getElementById('videoOverlay').style.display = 'flex';
  document.getElementById('mainVideo').play();
}
function closeVideo() {
  document.getElementById('videoOverlay').style.display = 'none';
  document.getElementById('mainVideo').pause();
}
</script>

</body>
</html>
