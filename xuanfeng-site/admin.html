<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>炫锋商行 - 后台管理</title>
<style>
:root {
  --gold: #d4a843;
  --gold-light: #f0c860;
  --bg-dark: #0a0a0a;
  --bg-card: #1a1a16;
  --text: #e8e8e8;
  --text-muted: #7f7f7f;
  --border: #d4a84333;
  --red: #c0392b;
  --font: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg-dark); color: var(--text); }

/* 顶部导航 */
.top-bar {
  background: linear-gradient(135deg, #1a1200, var(--bg-dark));
  padding: 15px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--gold);
}
.top-bar h1 { color: var(--gold); font-size: 20px; }
.top-bar .links { display: flex; gap: 20px; }
.top-bar .links a { color: var(--gold); font-size: 14px; }

/* 侧边+主体 */
.layout { display: flex; min-height: calc(100vh - 60px); }

.sidebar {
  width: 200px;
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  padding: 15px 0;
}
.sidebar a {
  display: block;
  padding: 12px 20px;
  color: var(--text-muted);
  font-size: 14px;
  transition: all .2s;
  border-left: 3px solid transparent;
}
.sidebar a:hover, .sidebar a.active {
  color: var(--gold);
  background: rgba(212,168,67,0.08);
  border-left-color: var(--gold);
}

.main {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
}

.panel { display: none; }
.panel.active { display: block; }

.panel-title {
  font-size: 18px;
  color: var(--gold);
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--gold);
}

/* 表格 */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 20px;
}
.data-table th {
  background: rgba(212,168,67,0.1);
  color: var(--gold);
  padding: 10px 12px;
  text-align: left;
  font-size: 13px;
  border: 1px solid var(--border);
}
.data-table td {
  padding: 8px 12px;
  font-size: 13px;
  border: 1px solid var(--border);
}
.data-table tr:hover td { background: rgba(212,168,67,0.05); }

.btn {
  padding: 6px 14px;
  font-size: 12px;
  border: none;
  cursor: pointer;
  border-radius: 3px;
  transition: all .2s;
}
.btn-edit { background: var(--gold); color: #000; }
.btn-edit:hover { background: var(--gold-light); }
.btn-del { background: var(--red); color: #fff; }
.btn-del:hover { background: #e74c3c; }
.btn-add { background: var(--gold); color: #000; padding: 10px 20px; font-size: 14px; margin-bottom: 15px; }
.btn-add:hover { background: var(--gold-light); }
.btn-save { background: #3ddc84; color: #000; padding: 10px 24px; font-size: 14px; }
.btn-save:hover { background: #2ba865; }
.btn-cancel { background: #555; color: #fff; padding: 10px 24px; font-size: 14px; }

/* 编辑弹窗 */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  z-index: 999;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--gold);
  border-radius: 6px;
  padding: 30px;
  width: 500px;
  max-width: 90vw;
}

.modal h2 {
  color: var(--gold);
  margin-bottom: 20px;
  font-size: 16px;
}

.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 5px;
}

.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 8px 12px;
  background: #222;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-size: 14px;
}

.form-group textarea { height: 100px; resize: vertical; }

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

/* 状态提示 */
.toast {
  display: none;
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 12px 24px;
  background: #3ddc84;
  color: #000;
  font-size: 14px;
  border-radius: 4px;
  z-index: 9999;
}
.toast.active { display: block; }

/* 网站设置 */
.setting-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}
.setting-item { margin-bottom: 0; }
.setting-item label { display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 5px; }
.setting-item input { width: 100%; padding: 8px 12px; background: #222; border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-size: 14px; }
</style>
</head>
<body>

<!-- 顶部 -->
<div class="top-bar">
  <h1>🔥 炩锋商行 · 后台管理</h1>
  <div class="links">
    <a href="index.html" target="_blank">查看前台</a>
  </div>
</div>

<div class="layout">
  <!-- 侧边导航 -->
  <div class="sidebar">
    <a href="javascript:void(0)" class="active" onclick="showPanel('site')">网站设置</a>
    <a href="javascript:void(0)" onclick="showPanel('banners')">轮播Banner</a>
    <a href="javascript:void(0)" onclick="showPanel('news')">新闻公告</a>
    <a href="javascript:void(0)" onclick="showPanel('strategy')">游戏攻略</a>
    <a href="javascript:void(0)" onclick="showPanel('guides')">新手指导</a>
    <a href="javascript:void(0)" onclick="showPanel('roles')">职业介绍</a>
    <a href="javascript:void(0)" onclick="showPanel('gameInfo')">游戏资料</a>
    <a href="javascript:void(0)" onclick="showPanel('gifts')">礼包中心</a>
    <a href="javascript:void(0)" onclick="showPanel('hall')">名人堂</a>
  </div>

  <!-- 主体 -->
  <div class="main">

    <!-- 网站设置 -->
    <div class="panel active" id="panelSite">
      <div class="panel-title">网站设置</div>
      <div class="setting-grid" id="siteSettings"></div>
      <div style="margin-top:20px">
        <button class="btn btn-save" onclick="saveSite()">保存设置</button>
      </div>
    </div>

    <!-- 轮播Banner -->
    <div class="panel" id="panelBanners">
      <div class="panel-title">轮播Banner</div>
      <button class="btn btn-add" onclick="openBannerModal()">+ 添加Banner</button>
      <table class="data-table">
        <thead><tr><th>图片</th><th>标题</th><th>操作</th></tr></thead>
        <tbody id="bannerTable"></tbody>
      </table>
    </div>

    <!-- 新闻公告 -->
    <div class="panel" id="panelNews">
      <div class="panel-title">新闻公告</div>
      <button class="btn btn-add" onclick="openNewsModal()">+ 添加新闻</button>
      <table class="data-table">
        <thead><tr><th>日期</th><th>分类</th><th>标题</th><th>链接</th><th>操作</th></tr></thead>
        <tbody id="newsTable"></tbody>
      </table>
    </div>

    <!-- 游戏攻略 -->
    <div class="panel" id="panelStrategy">
      <div class="panel-title">游戏攻略</div>
      <button class="btn btn-add" onclick="openStratModal()">+ 添加攻略</button>
      <table class="data-table">
        <thead><tr><th>日期</th><th>分类</th><th>标题</th><th>链接</th><th>操作</th></tr></thead>
        <tbody id="stratTable"></tbody>
      </table>
    </div>

    <!-- 新手指导 -->
    <div class="panel" id="panelGuides">
      <div class="panel-title">新手指导</div>
      <button class="btn btn-add" onclick="openGuideModal()">+ 添加指导</button>
      <table class="data-table">
        <thead><tr><th>名称</th><th>链接</th><th>操作</th></tr></thead>
        <tbody id="guideTable"></tbody>
      </table>
      <div style="margin-top:20px">
        <div class="panel-title" style="font-size:14px">快捷链接</div>
        <table class="data-table">
          <thead><tr><th>名称</th><th>链接</th><th>操作</th></tr></thead>
          <tbody id="guideLinkTable"></tbody>
        </table>
        <button class="btn btn-add" onclick="openGuideLinkModal()">+ 添加快捷链接</button>
      </div>
    </div>

    <!-- 职业介绍 -->
    <div class="panel" id="panelRoles">
      <div class="panel-title">职业介绍</div>
      <table class="data-table">
        <thead><tr><th>职业名</th><th>标签</th><th>属性</th><th>难度</th><th>男图</th><th>女图</th><th>操作</th></tr></thead>
        <tbody id="roleTable"></tbody>
      </table>
    </div>

    <!-- 游戏资料 -->
    <div class="panel" id="panelGameInfo">
      <div class="panel-title">游戏资料</div>
      <div id="gameInfoPanels"></div>
    </div>

    <!-- 礼包中心 -->
    <div class="panel" id="panelGifts">
      <div class="panel-title">礼包中心</div>
      <button class="btn btn-add" onclick="openGiftModal()">+ 添加礼包</button>
      <table class="data-table">
        <thead><tr><th>图标</th><th>名称</th><th>描述</th><th>链接</th><th>操作</th></tr></thead>
        <tbody id="giftTable"></tbody>
      </table>
    </div>

    <!-- 名人堂 -->
    <div class="panel" id="panelHall">
      <div class="panel-title">名人堂</div>
      <button class="btn btn-add" onclick="openHallModal()">+ 添加名人</button>
      <table class="data-table">
        <thead><tr><th>图片</th><th>描述</th><th>操作</th></tr></thead>
        <tbody id="hallTable"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">编辑</h2>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-save" onclick="saveModal()">保存</button>
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<!-- 提示 -->
<div class="toast" id="toast"></div>

<script>
let siteData = null;
let currentEdit = { type: '', index: -1, subIndex: -1 };

// 加载JSON
fetch('data.json').then(r => r.json()).then(d => {
  siteData = d;
  renderAll();
}).catch(err => alert('加载data.json失败: ' + err));

// === 导航切换 ===
function showPanel(name) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel' + capitalize(name)).classList.add('active');
}

function capitalize(s) {
  const map = { site:'Site', banners:'Banners', news:'News', strategy:'Strategy', guides:'Guides', roles:'Roles', gameInfo:'GameInfo', gifts:'Gifts', hall:'Hall' };
  return map[s] || s;
}

// === 渲染所有 ===
function renderAll() {
  renderSite();
  renderBanners();
  renderNews();
  renderStrategy();
  renderGuides();
  renderRoles();
  renderGameInfo();
  renderGifts();
  renderHall();
}

// 网站设置
function renderSite() {
  const s = siteData.site;
  const fields = [
    { key:'name', label:'网站名称', value:s.name },
    { key:'keywords', label:'SEO关键词', value:s.keywords },
    { key:'description', label:'SEO描述', value:s.description },
    { key:'copyright', label:'版权信息', value:s.copyright },
    { key:'contact', label:'联系方式', value:s.contact },
    { key:'androidUrl', label:'安卓下载链接', value:s.androidUrl },
    { key:'iosUrl', label:'苹果下载链接', value:s.iosUrl },
    { key:'videoUrl', label:'视频文件路径', value:s.videoUrl }
  ];
  const container = document.getElementById('siteSettings');
  container.innerHTML = fields.map(f =>
    `<div class="setting-item"><label>${f.label}</label><input id="site_${f.key}" value="${f.value}"></div>`
  ).join('');
}

// Banner
function renderBanners() {
  const tbody = document.getElementById('bannerTable');
  tbody.innerHTML = siteData.banners.map((b, i) =>
    `<tr><td><img src="${b.img}" height="60"></td><td>${b.title}</td><td><button class="btn btn-edit" onclick="openBannerModal(${i})">编辑</button> <button class="btn btn-del" onclick="delBanner(${i})">删除</button></td></tr>`
  ).join('');
}

// 新闻
function renderNews() {
  const tbody = document.getElementById('newsTable');
  let html = '';
  const cats = Object.keys(siteData.news);
  cats.forEach(cat => {
    siteData.news[cat].forEach((item, i) => {
      html += `<tr><td>${item.date}</td><td>${item.tag}</td><td>${item.title}</td><td>${item.url}</td><td><button class="btn btn-edit" onclick="openNewsModal('${cat}',${i})">编辑</button> <button class="btn btn-del" onclick="delNews('${cat}',${i})">删除</button></td></tr>`;
    });
  });
  tbody.innerHTML = html;
}

// 攻略
function renderStrategy() {
  const tbody = document.getElementById('stratTable');
  let html = '';
  const cats = Object.keys(siteData.strategy);
  cats.forEach(cat => {
    siteData.strategy[cat].forEach((item, i) => {
      html += `<tr><td>${item.date}</td><td>${item.tag}</td><td>${item.title}</td><td>${item.url}</td><td><button class="btn btn-edit" onclick="openStratModal('${cat}',${i})">编辑</button> <button class="btn btn-del" onclick="delStrat('${cat}',${i})">删除</button></td></tr>`;
    });
  });
  tbody.innerHTML = html;
}

// 新手指导
function renderGuides() {
  document.getElementById('guideTable').innerHTML = siteData.guides.map((g, i) =>
    `<tr><td>${g.name}</td><td>${g.url}</td><td><button class="btn btn-edit" onclick="openGuideModal(${i})">编辑</button> <button class="btn btn-del" onclick="delGuide(${i})">删除</button></td></tr>`
  ).join('');
  document.getElementById('guideLinkTable').innerHTML = siteData.guideLinks.map((g, i) =>
    `<tr><td>${g.name}</td><td>${g.url}</td><td><button class="btn btn-edit" onclick="openGuideLinkModal(${i})">编辑</button> <button class="btn btn-del" onclick="delGuideLink(${i})">删除</button></td></tr>`
  ).join('');
}

// 职业
function renderRoles() {
  document.getElementById('roleTable').innerHTML = siteData.roles.map((r, i) =>
    `<tr><td>${r.name}</td><td>${r.tag}</td><td>${r.attr}</td><td>${r.difficulty}</td><td><img src="${r.manImg}" height="60"></td><td><img src="${r.womanImg}" height="60"></td><td><button class="btn btn-edit" onclick="openRoleModal(${i})">编辑</button></td></tr>`
  ).join('');
}

// 游戏资料
function renderGameInfo() {
  const container = document.getElementById('gameInfoPanels');
  const cats = Object.keys(siteData.gameInfo);
  let html = '';
  cats.forEach(cat => {
    html += `<div style="margin-bottom:20px"><div class="panel-title" style="font-size:14px">${cat} <button class="btn btn-add" onclick="openInfoItemModal('${cat}')">+ 添加</button></div>`;
    html += `<table class="data-table"><thead><tr><th>名称</th><th>链接</th><th>操作</th></tr></thead><tbody>`;
    siteData.gameInfo[cat].forEach((item, i) => {
      html += `<tr><td>${item.name}</td><td>${item.url}</td><td><button class="btn btn-edit" onclick="openInfoItemModal('${cat}',${i})">编辑</button> <button class="btn btn-del" onclick="delInfoItem('${cat}',${i})">删除</button></td></tr>`;
    });
    html += '</tbody></table></div>';
  });
  container.innerHTML = html;
}

// 礼包
function renderGifts() {
  document.getElementById('giftTable').innerHTML = siteData.gifts.map((g, i) =>
    `<tr><td>${g.icon}</td><td>${g.name}</td><td>${g.desc}</td><td>${g.url}</td><td><button class="btn btn-edit" onclick="openGiftModal(${i})">编辑</button> <button class="btn btn-del" onclick="delGift(${i})">删除</button></td></tr>`
  ).join('');
}

// 名人堂
function renderHall() {
  document.getElementById('hallTable').innerHTML = siteData.hall.map((h, i) =>
    `<tr><td><img src="${h.img}" height="60"></td><td>${h.desc}</td><td><button class="btn btn-edit" onclick="openHallModal(${i})">编辑</button> <button class="btn btn-del" onclick="delHall(${i})">删除</button></td></tr>`
  ).join('');
}

// === 弹窗系统 ===
function openModal(title, bodyHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('active');
  setTimeout(() => t.classList.remove('active'), 2000);
}

// 保存JSON到服务器（通过简单API）
function saveData() {
  // 由于是静态站点没有后端API，我们把JSON写入localStorage并更新文件
  // 实际部署时需要一个简单的后端或使用localStorage+手动导出
  const jsonStr = JSON.stringify(siteData, null, 2);
  
  // 存localStorage作为持久化
  localStorage.setItem('xuanfeng_data', jsonStr);
  
  // 尝试写入文件（仅本地开发时可行）
  // 生产环境需要后端API
  toast('已保存！请手动导出data.json文件或配置后端API');
}

// === 各模块弹窗 ===

// Banner
function openBannerModal(index) {
  const isNew = index === undefined;
  const b = isNew ? { img:'', title:'' } : siteData.banners[index];
  currentEdit = { type: 'banner', index: isNew ? -1 : index };
  openModal(isNew ? '添加Banner' : '编辑Banner', `
    <div class="form-group"><label>图片路径</label><input id="m_img" value="${b.img}"></div>
    <div class="form-group"><label>标题</label><input id="m_title" value="${b.title}"></div>
  `);
}

function delBanner(i) {
  siteData.banners.splice(i, 1);
  renderBanners();
  saveData();
}

// News
function openNewsModal(cat, index) {
  const isNew = index === undefined;
  const cats = Object.keys(siteData.news);
  const item = isNew ? { date:'', tag: cats[0], title:'', url:'#' } : siteData.news[cat][index];
  currentEdit = { type: 'news', cat: isNew ? '' : cat, index: isNew ? -1 : index };
  openModal(isNew ? '添加新闻' : '编辑新闻', `
    <div class="form-group"><label>日期 (如06-17)</label><input id="m_date" value="${item.date}"></div>
    <div class="form-group"><label>分类</label><select id="m_tag">${cats.map(c => `<option ${c===item.tag?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="form-group"><label>标题</label><input id="m_title" value="${item.title}"></div>
    <div class="form-group"><label>链接</label><input id="m_url" value="${item.url}"></div>
  `);
}

function delNews(cat, i) {
  siteData.news[cat].splice(i, 1);
  renderNews();
  saveData();
}

// Strategy
function openStratModal(cat, index) {
  const isNew = index === undefined;
  const cats = Object.keys(siteData.strategy);
  const item = isNew ? { date:'', tag: cats[0], title:'', url:'#' } : siteData.strategy[cat][index];
  currentEdit = { type: 'strategy', cat: isNew ? '' : cat, index: isNew ? -1 : index };
  openModal(isNew ? '添加攻略' : '编辑攻略', `
    <div class="form-group"><label>日期</label><input id="m_date" value="${item.date}"></div>
    <div class="form-group"><label>分类</label><select id="m_tag">${cats.map(c => `<option ${c===item.tag?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="form-group"><label>标题</label><input id="m_title" value="${item.title}"></div>
    <div class="form-group"><label>链接</label><input id="m_url" value="${item.url}"></div>
  `);
}

function delStrat(cat, i) {
  siteData.strategy[cat].splice(i, 1);
  renderStrategy();
  saveData();
}

// Guide
function openGuideModal(index) {
  const isNew = index === undefined;
  const g = isNew ? { name:'', url:'#' } : siteData.guides[index];
  currentEdit = { type: 'guide', index: isNew ? -1 : index };
  openModal(isNew ? '添加指导' : '编辑指导', `
    <div class="form-group"><label>名称</label><input id="m_name" value="${g.name}"></div>
    <div class="form-group"><label>链接</label><input id="m_url" value="${g.url}"></div>
  `);
}

function delGuide(i) { siteData.guides.splice(i, 1); renderGuides(); saveData(); }

// GuideLink
function openGuideLinkModal(index) {
  const isNew = index === undefined;
  const g = isNew ? { name:'', url:'#' } : siteData.guideLinks[index];
  currentEdit = { type: 'guideLink', index: isNew ? -1 : index };
  openModal(isNew ? '添加快捷链接' : '编辑快捷链接', `
    <div class="form-group"><label>名称</label><input id="m_name" value="${g.name}"></div>
    <div class="form-group"><label>链接</label><input id="m_url" value="${g.url}"></div>
  `);
}

function delGuideLink(i) { siteData.guideLinks.splice(i, 1); renderGuides(); saveData(); }

// Role
function openRoleModal(index) {
  const r = siteData.roles[index];
  currentEdit = { type: 'role', index };
  openModal('编辑职业', `
    <div class="form-group"><label>职业名</label><input id="m_name" value="${r.name}"></div>
    <div class="form-group"><label>标签</label><input id="m_tag" value="${r.tag}"></div>
    <div class="form-group"><label>属性</label><input id="m_attr" value="${r.attr}"></div>
    <div class="form-group"><label>难度(1-5)</label><input id="m_diff" type="number" min="1" max="5" value="${r.difficulty}"></div>
    <div class="form-group"><label>男图路径</label><input id="m_manImg" value="${r.manImg}"></div>
    <div class="form-group"><label>女图路径</label><input id="m_womanImg" value="${r.womanImg}"></div>
  `);
}

// GameInfo
function openInfoItemModal(cat, index) {
  const isNew = index === undefined;
  const item = isNew ? { name:'', url:'#' } : siteData.gameInfo[cat][index];
  currentEdit = { type: 'gameInfo', cat, index: isNew ? -1 : index };
  openModal(isNew ? '添加资料项' : '编辑资料项', `
    <div class="form-group"><label>名称</label><input id="m_name" value="${item.name}"></div>
    <div class="form-group"><label>链接</label><input id="m_url" value="${item.url}"></div>
  `);
}

function delInfoItem(cat, i) { siteData.gameInfo[cat].splice(i, 1); renderGameInfo(); saveData(); }

// Gift
function openGiftModal(index) {
  const isNew = index === undefined;
  const g = isNew ? { icon:'🎁', name:'', desc:'', url:'#' } : siteData.gifts[index];
  currentEdit = { type: 'gift', index: isNew ? -1 : index };
  openModal(isNew ? '添加礼包' : '编辑礼包', `
    <div class="form-group"><label>图标(emoji)</label><input id="m_icon" value="${g.icon}"></div>
    <div class="form-group"><label>名称</label><input id="m_name" value="${g.name}"></div>
    <div class="form-group"><label>描述</label><input id="m_desc" value="${g.desc}"></div>
    <div class="form-group"><label>链接</label><input id="m_url" value="${g.url}"></div>
  `);
}

function delGift(i) { siteData.gifts.splice(i, 1); renderGifts(); saveData(); }

// Hall
function openHallModal(index) {
  const isNew = index === undefined;
  const h = isNew ? { img:'', desc:'' } : siteData.hall[index];
  currentEdit = { type: 'hall', index: isNew ? -1 : index };
  openModal(isNew ? '添加名人' : '编辑名人', `
    <div class="form-group"><label>图片路径</label><input id="m_img" value="${h.img}"></div>
    <div class="form-group"><label>描述</label><input id="m_desc" value="${h.desc}"></div>
  `);
}

function delHall(i) { siteData.hall.splice(i, 1); renderHall(); saveData(); }

// === 保存弹窗数据 ===
function saveModal() {
  const type = currentEdit.type;
  const idx = currentEdit.index;

  switch(type) {
    case 'banner':
      const b = { img: gv('m_img'), title: gv('m_title') };
      if (idx === -1) siteData.banners.push(b); else siteData.banners[idx] = b;
      renderBanners();
      break;

    case 'news':
      const cat = currentEdit.cat || gv('m_tag');
      const newItem = { date: gv('m_date'), tag: gv('m_tag'), title: gv('m_title'), url: gv('m_url') };
      if (idx === -1) {
        if (!siteData.news[cat]) siteData.news[cat] = [];
        siteData.news[cat].push(newItem);
      } else {
        // 如果分类变了，从旧分类移到新分类
        const oldCat = currentEdit.cat;
        if (oldCat !== newItem.tag) {
          siteData.news[oldCat].splice(idx, 1);
          if (!siteData.news[newItem.tag]) siteData.news[newItem.tag] = [];
          siteData.news[newItem.tag].push(newItem);
        } else {
          siteData.news[cat][idx] = newItem;
        }
      }
      renderNews();
      break;

    case 'strategy':
      const sCat = currentEdit.cat || gv('m_tag');
      const sItem = { date: gv('m_date'), tag: gv('m_tag'), title: gv('m_title'), url: gv('m_url') };
      if (idx === -1) {
        if (!siteData.strategy[sCat]) siteData.strategy[sCat] = [];
        siteData.strategy[sCat].push(sItem);
      } else {
        const oldSCat = currentEdit.cat;
        if (oldSCat !== sItem.tag) {
          siteData.strategy[oldSCat].splice(idx, 1);
          if (!siteData.strategy[sItem.tag]) siteData.strategy[sItem.tag] = [];
          siteData.strategy[sItem.tag].push(sItem);
        } else {
          siteData.strategy[sCat][idx] = sItem;
        }
      }
      renderStrategy();
      break;

    case 'guide':
      const guide = { name: gv('m_name'), url: gv('m_url') };
      if (idx === -1) siteData.guides.push(guide); else siteData.guides[idx] = guide;
      renderGuides();
      break;

    case 'guideLink':
      const gl = { name: gv('m_name'), url: gv('m_url') };
      if (idx === -1) siteData.guideLinks.push(gl); else siteData.guideLinks[idx] = gl;
      renderGuides();
      break;

    case 'role':
      siteData.roles[idx] = {
        name: gv('m_name'), tag: gv('m_tag'), attr: gv('m_attr'),
        difficulty: parseInt(gv('m_diff')), manImg: gv('m_manImg'), womanImg: gv('m_womanImg')
      };
      renderRoles();
      break;

    case 'gameInfo':
      const giCat = currentEdit.cat;
      const giItem = { name: gv('m_name'), url: gv('m_url') };
      if (idx === -1) siteData.gameInfo[giCat].push(giItem); else siteData.gameInfo[giCat][idx] = giItem;
      renderGameInfo();
      break;

    case 'gift':
      const gift = { icon: gv('m_icon'), name: gv('m_name'), desc: gv('m_desc'), url: gv('m_url') };
      if (idx === -1) siteData.gifts.push(gift); else siteData.gifts[idx] = gift;
      renderGifts();
      break;

    case 'hall':
      const hallItem = { img: gv('m_img'), desc: gv('m_desc') };
      if (idx === -1) siteData.hall.push(hallItem); else siteData.hall[idx] = hallItem;
      renderHall();
      break;
  }

  closeModal();
  saveData();
}

function gv(id) { return document.getElementById(id)?.value || ''; }

// === 保存网站设置 ===
function saveSite() {
  const fields = ['name','keywords','description','copyright','contact','androidUrl','iosUrl','videoUrl'];
  fields.forEach(f => {
    siteData.site[f] = gv('site_' + f);
  });
  saveData();
  toast('网站设置已保存！');
}

// === 导出JSON文件 ===
function exportJSON() {
  const blob = new Blob([JSON.stringify(siteData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.json';
  a.click();
  toast('JSON文件已导出！');
}

// 页面加载时检查localStorage是否有数据
const stored = localStorage.getItem('xuanfeng_data');
if (stored) {
  try {
    siteData = JSON.parse(stored);
    renderAll();
  } catch(e) {}
}
</script>
