<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 炫锋商行</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f18; --bg-card: #1a1a2e; --bg-input: #14141f;
            --border: #2a2a3a; --gold: #ffd700; --red: #e63946;
            --text: #e8e8e8; --text-muted: #888; --green: #00c853;
        }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* 顶栏 */
        .admin-header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .admin-header h1 { font-size: 20px; color: var(--gold); display: flex; align-items: center; gap: 8px; }
        .admin-header .back-link { color: var(--text-muted); font-size: 14px; text-decoration: none; }
        .admin-header .back-link:hover { color: var(--gold); }

        /* 布局 */
        .admin-body { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 220px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 16px 0; flex-shrink: 0; }
        .sidebar-item { display: block; padding: 12px 24px; color: var(--text-muted); font-size: 15px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.2s; text-decoration: none; }
        .sidebar-item:hover { color: var(--text); background: rgba(255,215,0,0.03); }
        .sidebar-item.active { color: var(--gold); border-left-color: var(--gold); background: rgba(255,215,0,0.05); font-weight: 700; }

        .main-content { flex: 1; padding: 32px; overflow-y: auto; max-width: 900px; }

        /* 面板 */
        .panel { display: none; }
        .panel.active { display: block; }
        .panel-title { font-size: 22px; font-weight: 900; color: var(--gold); margin-bottom: 24px; }
        .panel-desc { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }

        /* 表单 */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--gold); margin-bottom: 6px; }
        .form-group .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .form-input { width: 100%; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: var(--gold); }
        textarea.form-input { min-height: 80px; resize: vertical; font-family: inherit; }
        select.form-input { cursor: pointer; }

        /* 按钮 */
        .btn { padding: 10px 24px; border: none; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, var(--red), #b22d37); color: #fff; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
        .btn-outline:hover { background: rgba(255,215,0,0.1); }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
        .btn-danger:hover { background: rgba(230,57,70,0.1); }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }

        /* 列表项 */
        .list-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .list-item:hover { border-color: rgba(255,215,0,0.3); }
        .list-item-info { flex: 1; }
        .list-item-info h4 { font-size: 15px; color: var(--text); margin-bottom: 4px; }
        .list-item-info p { font-size: 13px; color: var(--text-muted); }
        .list-item-actions { display: flex; gap: 8px; flex-shrink: 0; }

        /* 行情表格编辑 */
        .market-edit-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
        .market-edit-row .form-input { padding: 8px 10px; font-size: 13px; }

        /* Toast */
        .toast { position: fixed; top: 80px; right: 24px; background: var(--green); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; z-index: 9999; opacity: 0; transform: translateY(-10px); transition: all 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: var(--red); }

        /* 移动端 */
        @media (max-width: 768px) {
            .admin-body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 0; }
            .sidebar-item { padding: 12px 16px; border-left: none; border-bottom: 3px solid transparent; white-space: nowrap; }
            .sidebar-item.active { border-bottom-color: var(--gold); border-left-color: transparent; }
            .main-content { padding: 20px 16px; }
            .market-edit-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>

            rules: '所有交易均通过商行担保，不接私单、不走私下\n交易前请确认商品信息、价格、区服无误\n账号交易请保留交易凭证和卖家身份证信息\n如遇到任何问题，请在48小时内联系客服处理\n本站所有交易基于玩家自愿原则，请遵守游戏官方相关规定',
            coop: '诚招代理、工作室、散人合作伙伴。零门槛入驻，稳定货源，高额返利，专业培训。有意者请通过QQ/微信联系客服，备注"代理合作"。'
        }
    };

    // ===== 存储 =====
    function getData() {
        const saved = localStorage.getItem('xuanfeng_admin_data');
        return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
    function saveData(data) {
        localStorage.setItem('xuanfeng_admin_data', JSON.stringify(data));
    }

    // ===== 面板切换 =====
    function switchPanel(name) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
        document.getElementById('panel-' + name).classList.add('active');
        event.target.classList.add('active');
    }

    // ===== Toast =====
    function showToast(msg, isError) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show' + (isError ? ' error' : '');
        setTimeout(() => t.className = 'toast', 2500);
    }

    // ===== 站点配置 =====
    function loadConfig() {
        const d = getData().config;
        document.getElementById('cfg-brandName').value = d.brandName || '';
        document.getElementById('cfg-brandSlogan').value = d.brandSlogan || '';
        document.getElementById('cfg-qq').value = d.qq || '';
        document.getElementById('cfg-wechat').value = d.wechat || '';
        document.getElementById('cfg-wechatType').value = d.wechatType || '公众号';
        document.getElementById('cfg-workTime').value = d.workTime || '';
        document.getElementById('cfg-notice').value = d.notice || '';
        document.getElementById('cfg-seoKeywords').value = d.seoKeywords || '';
        document.getElementById('cfg-stats-players').value = (d.stats && d.stats.players) || '';
        document.getElementById('cfg-stats-trades').value = (d.stats && d.stats.trades) || '';
        document.getElementById('cfg-stats-satisfaction').value = (d.stats && d.stats.satisfaction) || '';
        document.getElementById('cfg-logoType').value = d.logoType || 'svg';
        document.getElementById('cfg-logoImage').value = d.logoImage || '';
        document.getElementById('cfg-logoText').value = d.logoText || '';
        document.getElementById('cfg-svgLogo').value = d.svgLogo || '';
        toggleLogoFields();
        // About
        const a = getData().about;
        document.getElementById('cfg-about-intro').value = a.intro || '';
        document.getElementById('cfg-about-philosophy').value = a.philosophy || '';
        document.getElementById('cfg-about-rules').value = a.rules || '';
        document.getElementById('cfg-about-coop').value = a.coop || '';
    }

    function saveConfig() {
        const data = getData();
        data.config.brandName = document.getElementById('cfg-brandName').value;
        data.config.brandSlogan = document.getElementById('cfg-brandSlogan').value;
        data.config.qq = document.getElementById('cfg-qq').value;
        data.config.wechat = document.getElementById('cfg-wechat').value;
        data.config.wechatType = document.getElementById('cfg-wechatType').value;
        data.config.workTime = document.getElementById('cfg-workTime').value;
        data.config.notice = document.getElementById('cfg-notice').value;
        data.config.seoKeywords = document.getElementById('cfg-seoKeywords').value;
        data.config.stats = {
            players: document.getElementById('cfg-stats-players').value,
            trades: document.getElementById('cfg-stats-trades').value,
            satisfaction: document.getElementById('cfg-stats-satisfaction').value
        };
        data.config.logoType = document.getElementById('cfg-logoType').value;
        data.config.logoImage = document.getElementById('cfg-logoImage').value;
        data.config.logoText = document.getElementById('cfg-logoText').value;
        data.config.svgLogo = document.getElementById('cfg-svgLogo').value;
        saveData(data);
        showToast('✅ 配置已保存！请刷新官网页面查看效果');
        // 生成config.js内容供下载
        generateConfigFile(data);
    }

    function generateConfigFile(data) {
        const c = data.config;
        const js = `// 炫锋商行 - 全站配置中心（由管理后台生成）
const SITE_CONFIG = {
  brandName: '${c.brandName}',
  brandSlogan: '${c.brandSlogan}',
  qq: '${c.qq}',
  wechat: '${c.wechat}',
  wechatType: '${c.wechatType}',
  workTime: '${c.workTime}',
  logoType: '${c.logoType}',
  logoImage: '${c.logoImage}',
  logoText: '${c.logoText}',
  svgLogo: \`${c.svgLogo}\`,
  seoKeywords: '${c.seoKeywords}',
  stats: { players: '${c.stats.players}', trades: '${c.stats.trades}', satisfaction: '${c.stats.satisfaction}' },
  socialLinks: { qq: 'https://wpa.qq.com/msgrdn?v=3&uin=${c.qq}&site=qq&menu=yes', wechat: '' },
  notice: '${c.notice}'
};`;
        // 创建下载链接
        const blob = new Blob([js], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'config.js';
        // 不自动下载，保存到变量
        window._configJsUrl = url;
    }

    function toggleLogoFields() {
        const type = document.getElementById('cfg-logoType').value;
        document.getElementById('logo-image-group').style.display = type === 'image' ? 'block' : 'none';
        document.getElementById('logo-text-group').style.display = type === 'text' ? 'block' : 'none';
    }

    function previewLogo() {
        const type = document.getElementById('cfg-logoType').value;
        const el = document.getElementById('logo-preview-content');
        const brand = document.getElementById('cfg-brandName').value || '炫锋商行';
        if (type === 'svg') {
            const svg = document.getElementById('cfg-svgLogo').value;
            el.innerHTML = (svg || '⚔') + ' ' + brand;
        } else if (type === 'image') {
            const img = document.getElementById('cfg-logoImage').value;
            el.innerHTML = `<img src="${img}" style="height:32px;vertical-align:middle"> ${brand}`;
        } else {
            el.innerHTML = `<span style="font-size:28px;font-weight:900">${document.getElementById('cfg-logoText').value || '炫锋'}</span>`;
        }
    }

    // ===== 文章管理 =====
    function renderNews() {
        const list = getData().news;
        const el = document.getElementById('news-list');
        el.innerHTML = list.map((n, i) => `
            <div class="list-item">
                <div class="list-item-info">
                    <h4><span style="color:var(--red);font-size:12px;margin-right:6px;">[${n.tag}]</span>${n.title}</h4>
                    <p>${n.date} · ${n.desc.substring(0, 40)}...</p>
                </div>
                <div class="list-item-actions">
                    <button class="btn btn-outline btn-sm" onclick="editNews(${i})">编辑</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteNews(${i})">删除</button>
                </div>
            </div>
        `).join('');
    }

    function addNews() {
        const data = getData();
        data.news.unshift({ tag: '攻略', tagClass: '', date: new Date().toISOString().slice(0,10), title: '新文章标题', desc: '文章摘要...' });
        saveData(data);
        renderNews();
    }

    function editNews(i) {
        const data = getData();
        const n = data.news[i];
        const newTitle = prompt('文章标题：', n.title);
        if (newTitle === null) return;
        const newDesc = prompt('文章摘要：', n.desc);
        if (newDesc === null) return;
        const newTag = prompt('标签（热门/攻略/活动/防骗）：', n.tag);
        if (newTag === null) return;
        n.title = newTitle; n.desc = newDesc; n.tag = newTag;
        n.tagClass = newTag === '热门' ? 'hot' : '';
        n.date = new Date().toISOString().slice(0,10);
        saveData(data);
        renderNews();
        showToast('✅ 文章已更新');
    }

    function deleteNews(i) {
        if (!confirm('确定删除这篇文章？')) return;
        const data = getData();
        data.news.splice(i, 1);
        saveData(data);
        renderNews();
        showToast('🗑 已删除');
    }

    // ===== 行情管理 =====
    function renderMarket() {
        const data = getData();
        // 元宝
        const ybEl = document.getElementById('market-yb-list');
        ybEl.innerHTML = data.marketYb.map((r, i) => `
            <div class="market-edit-row">
                <input class="form-input" value="${r.game}" onchange="updateMarketYb(${i},'game',this.value)" placeholder="游戏">
                <input class="form-input" value="${r.server}" onchange="updateMarketYb(${i},'server',this.value)" placeholder="区服">
                <input class="form-input" value="${r.buyRatio}" onchange="updateMarketYb(${i},'buyRatio',this.value)" placeholder="买入比例">
                <input class="form-input" value="${r.sellRatio}" onchange="updateMarketYb(${i},'sellRatio',this.value)" placeholder="卖出比例">
                <select class="form-input" onchange="updateMarketYb(${i},'status',this.value)">
                    <option value="up" ${r.status==='up'?'selected':''}>↑ 涨</option>
                    <option value="stable" ${r.status==='stable'?'selected':''}>→ 稳</option>
                    <option value="down" ${r.status==='down'?'selected':''}>↓ 跌</option>
                </select>
                <button class="btn btn-danger btn-sm" onclick="deleteMarketYb(${i})">✕</button>
            </div>
        `).join('');
        // 账号
        const accEl = document.getElementById('market-acc-list');
        accEl.innerHTML = data.marketAcc.map((r, i) => `
            <div class="market-edit-row">
                <input class="form-input" value="${r.game}" onchange="updateMarketAcc(${i},'game',this.value)" placeholder="游戏">
                <input class="form-input" value="${r.type}" onchange="updateMarketAcc(${i},'type',this.value)" placeholder="账号类型">
                <input class="form-input" value="${r.price}" onchange="updateMarketAcc(${i},'price',this.value)" placeholder="价格区间">
                <select class="form-input" onchange="updateMarketAcc(${i},'hot',this.value)">
                    <option value="hot" ${r.hot==='hot'?'selected':''}>🔥 热门</option>
                    <option value="up" ${r.hot==='up'?'selected':''}>↑ 涨价</option>
                    <option value="stable" ${r.hot==='stable'?'selected':''}>一般</option>
                </select>
                <input class="form-input" value="${r.note}" onchange="updateMarketAcc(${i},'note',this.value)" placeholder="备注">
                <button class="btn btn-danger btn-sm" onclick="deleteMarketAcc(${i})">✕</button>
            </div>
        `).join('');
    }

    function updateMarketYb(i, key, val) { const d = getData(); d.marketYb[i][key] = val; saveData(d); }
    function updateMarketAcc(i, key, val) { const d = getData(); d.marketAcc[i][key] = val; saveData(d); }
    function addMarketYb() { const d = getData(); d.marketYb.push({game:'',server:'',buyRatio:'',sellRatio:'',date:new Date().toISOString().slice(5,10),status:'stable'}); saveData(d); renderMarket(); }
    function addMarketAcc() { const d = getData(); d.marketAcc.push({game:'',type:'',price:'',hot:'stable',note:''}); saveData(d); renderMarket(); }
    function deleteMarketYb(i) { const d = getData(); d.marketYb.splice(i,1); saveData(d); renderMarket(); }
    function deleteMarketAcc(i) { const d = getData(); d.marketAcc.splice(i,1); saveData(d); renderMarket(); }
    function saveMarket() { showToast('✅ 行情数据已保存！需导出生成HTML文件后才能在官网生效'); }

    // ===== FAQ管理 =====
    function renderFaqs() {
        const faqs = getData().faqs;
        const el = document.getElementById('faq-list-admin');
        el.innerHTML = faqs.map((cat, ci) => `
            <div style="margin-bottom:24px;">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                    <h3 style="color:var(--gold);font-size:16px;">${cat.category}</h3>
                    <button class="btn btn-outline btn-sm" onclick="addFaqItem(${ci})">➕ 添加问题</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteFaqCat(${ci})">删除分类</button>
                </div>
                ${cat.items.map((item, ii) => `
                    <div class="list-item">
                        <div class="list-item-info">
                            <h4>Q: ${item.q}</h4>
                            <p>A: ${item.a.substring(0, 60)}...</p>
                        </div>
                        <div class="list-item-actions">
                            <button class="btn btn-outline btn-sm" onclick="editFaqItem(${ci},${ii})">编辑</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteFaqItem(${ci},${ii})">删除</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `).join('');
    }

    function addFaq() {
        const cat = prompt('新分类名称：');
        if (!cat) return;
        const d = getData(); d.faqs.push({category: cat, items: []}); saveData(d); renderFaqs();
    }

    function deleteFaqCat(ci) {
        if (!confirm('确定删除整个分类？')) return;
        const d = getData(); d.faqs.splice(ci, 1); saveData(d); renderFaqs();
    }

    function addFaqItem(ci) {
        const q = prompt('问题：');
        if (!q) return;
        const a = prompt('回答：');
        if (!a) return;
        const d = getData(); d.faqs[ci].items.push({q, a}); saveData(d); renderFaqs();
        showToast('✅ 已添加');
    }

    function editFaqItem(ci, ii) {
        const d = getData();
        const item = d.faqs[ci].items[ii];
        const q = prompt('问题：', item.q);
        if (q === null) return;
        const a = prompt('回答：', item.a);
        if (a === null) return;
        item.q = q; item.a = a;
        saveData(d); renderFaqs();
        showToast('✅ 已更新');
    }

    function deleteFaqItem(ci, ii) {
        if (!confirm('确定删除？')) return;
        const d = getData(); d.faqs[ci].items.splice(ii, 1); saveData(d); renderFaqs();
    }

    // ===== 关于我们 =====
    function saveAbout() {
        const d = getData();
        d.about = {
            intro: document.getElementById('cfg-about-intro').value,
            philosophy: document.getElementById('cfg-about-philosophy').value,
            rules: document.getElementById('cfg-about-rules').value,
            coop: document.getElementById('cfg-about-coop').value
        };
        saveData(d);
        showToast('✅ 关于我们已保存');
    }

    // ===== 导出功能 =====
    function exportAll() {
        const data = getData();
        // 生成config.js
        generateConfigFile(data);
        // 提示
        showToast('📁 配置文件已准备，点击下载 config.js 替换网站目录中的文件');
        if (window._configJsUrl) {
            const a = document.createElement('a');
            a.href = window._configJsUrl;
            a.download = 'config.js';
            a.click();
        }
    }

    // ===== 初始化 =====
    document.addEventListener('DOMContentLoaded', () => {
        loadConfig();
        renderNews();
        renderMarket();
        renderFaqs();
    });
    </script>
</body>
</html>
